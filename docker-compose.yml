services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-money_manager}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-money_manager_root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-money_manager_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./backend/.env.docker
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-money_manager}
      DB_PASSWORD: ${DB_PASSWORD:-money_manager_root}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5001}:5001"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      # Không truyền VITE_API_URL → production fallback dùng /api qua nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - app-network

  adminer:
    image: adminer:4
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "127.0.0.1:${ADMINER_PORT:-8080}:8080"
    depends_on:
      - mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads:
  backend_logs:
